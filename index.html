<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Auditoria Tudão — Ponto Extra</title>
<style>
/* --- ESTILOS DO PROJETO --- */
:root{ --g:#1D6F42;--gl:#E8F5EE;--gm:#2E9E64; --b:#1A5FA8;--bl:#EAF1FB; --tx:#5F5E5A; --bg:#F4F3EF;--bd:#DDDBD4; --w:#fff;--k:#1E1D1A; --sh:0 2px 10px rgba(0,0,0,.09);--rad:10px; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--k);min-height:100vh;font-size:15px}
header{background:var(--g);color:#fff;padding:.8rem 1.1rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
header h1{font-size:15px;font-weight:700} header p{font-size:11px;opacity:.75;margin-top:1px}
.wrap{max-width:580px;margin:0 auto;padding:1rem .9rem 4rem}
.card{background:var(--w);border-radius:var(--rad);padding:1.2rem;box-shadow:var(--sh);margin-bottom:.8rem}
.card-step{font-size:11px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--gm);margin-bottom:.4rem}
.card h2{font-size:17px;font-weight:700;margin-bottom:.9rem}
label.lbl{display:block;font-size:12.5px;font-weight:600;color:var(--tx);margin-bottom:5px;margin-top:1rem}
select, input{width:100%;padding:11px;border:1.5px solid var(--bd);border-radius:7px;font-size:15px;background:var(--w);outline:none;}
.btn{width:100%;padding:13px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;border:none;margin-top:1rem;text-align:center}
.btn-p{background:var(--g);color:#fff} .btn-p:disabled{background:var(--bd);cursor:not-allowed}
.oculto{display:none!important}

/* --- ESTILOS DA CÂMERA AO VIVO --- */
.camera-container {
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    margin-top: 10px;
    position: relative;
}
#video-camera { width: 100%; display: block; }
#img-preview { width: 100%; display: none; border-radius: 8px; margin-top: 10px; }
.btn-capturar { background: #b3261e; color: white; border-radius: 50px; margin-top: 10px; padding: 15px; font-size: 16px; }
#status-info { font-size: 12px; color: #b3261e; margin-top: 5px; font-weight: bold; }
</style>
</head>
<body>

<script>
// ==========================================
// TRAVA 1: BLOQUEIO DE COMPUTADOR/DESKTOP
// ==========================================
if (!/Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
    document.body.innerHTML = "<div style='display:flex; height:100vh; align-items:center; justify-content:center; background:#f4f3ef;'><h2 style='text-align:center; color:#D93025; padding:20px; background:#fff; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);'>⚠️ Acesso Negado.<br><br>Para evitar fraudes, as auditorias só podem ser realizadas através de um celular.</h2></div>";
    throw new Error("Acesso via Desktop bloqueado.");
}
</script>

<header>
  <div style="font-size:22px">📸</div>
  <div><h1>Auditoria Ponto Extra</h1><p>Registro de "Tudão"</p></div>
</header>

<div class="wrap">
  <div id="step1" class="card">
    <div class="card-step">Passo 1 de 2</div><h2>Identificação da Loja</h2>
    
    <label class="lbl">Supervisor</label>
    <select id="sel-sup" onchange="liberarPromotor()"><option value="">— Selecione —</option></select>
    
    <label class="lbl">Promotor</label>
    <select id="sel-prom" disabled onchange="liberarLoja()"><option value="">— Selecione —</option></select>
    
    <label class="lbl">Loja</label>
    <select id="sel-loja" disabled onchange="habilitarContinuar()"><option value="">— Selecione —</option></select>
    
    <button class="btn btn-p" id="btn-t1" disabled onclick="irParaPasso2()">Continuar →</button>
  </div>

  <div id="step2" class="card oculto">
    <div class="card-step">Passo 2 de 2</div><h2>Captura In-loco</h2>
    
    <label class="lbl">Tem Ponto Extra "Tudão" na loja?</label>
    <select id="sel-tudao" onchange="tratarSelecaoTudao()">
      <option value="">— Selecione —</option>
      <option value="Sim">Sim</option>
      <option value="Não">Não</option>
    </select>

    <div id="area-foto" class="oculto">
      <label class="lbl">Câmera ao vivo (Tire a foto do ponto extra)</label>
      
      <div class="camera-container" id="camera-box">
        <video id="video-camera" autoplay playsinline></video>
      </div>
      
      <button class="btn btn-capturar" id="btn-tirar-foto" onclick="capturarFoto()">📷 Capturar Foto Agora</button>
      
      <p id="status-info">Aguardando permissão de câmera e GPS...</p>
      
      <img id="img-preview" alt="Preview da Foto">
      <button class="btn btn-p oculto" id="btn-refazer" style="background:#5F5E5A;" onclick="refazerFoto()">🔄 Tirar foto novamente</button>
    </div>

    <button class="btn btn-p" id="btn-enviar" onclick="enviarDados()" disabled style="margin-top:20px;">Enviar Auditoria</button>
  </div>
</div>

// 2. LÓGICA DE CASCATA
// ==========================================
window.onload = () => {
  const sups = [...new Set(ROTEIRO.map(i => i.s))].sort();
  const selSup = document.getElementById('sel-sup');
  sups.forEach(s => selSup.innerHTML += `<option value="${s}">${s}</option>`);
};

function liberarPromotor() {
  const sup = document.getElementById('sel-sup').value;
  const selProm = document.getElementById('sel-prom');
  selProm.innerHTML = '<option value="">— Selecione —</option>';
  if(sup) {
    const proms = [...new Set(ROTEIRO.filter(i => i.s === sup).map(i => i.p))].sort();
    proms.forEach(p => selProm.innerHTML += `<option value="${p}">${p}</option>`);
    selProm.disabled = false;
  } else { selProm.disabled = true; }
  document.getElementById('sel-loja').disabled = true;
}

function liberarLoja() {
  const prom = document.getElementById('sel-prom').value;
  const selLoja = document.getElementById('sel-loja');
  selLoja.innerHTML = '<option value="">— Selecione —</option>';
  if(prom) {
    const lojas = ROTEIRO.filter(i => i.p === prom).sort((a,b) => a.c.localeCompare(b.c));
    lojas.forEach(l => {
      // Aqui inserimos o CNPJ e o NOME da loja separados por |
      selLoja.innerHTML += `<option value="${l.j}|${l.c}">${l.c}</option>`;
    });
    selLoja.disabled = false;
  }
}

function habilitarContinuar() {
  document.getElementById('btn-t1').disabled = document.getElementById('sel-loja').value === "";
}

function irParaPasso2() {
  document.getElementById('step1').classList.add('oculto');
  document.getElementById('step2').classList.remove('oculto');
}

// ==========================================
// 3. LÓGICA DA CÂMERA E GPS
// ==========================================
let videoStream = null;
let fotoBase64 = "";
let latFinal = 0, lngFinal = 0, endFinal = "Buscando endereço...";
let gpsPronto = false;

function tratarSelecaoTudao() {
  const tudao = document.getElementById('sel-tudao').value;
  const area = document.getElementById('area-foto');
  const btn = document.getElementById('btn-enviar');
  
  if(tudao === 'Sim') {
    area.classList.remove('oculto');
    btn.disabled = true;
    iniciarCameraEGPS();
  } else if (tudao === 'Não') {
    area.classList.add('oculto');
    btn.disabled = false;
    pararCamera();
  } else {
    area.classList.add('oculto');
    btn.disabled = true;
  }
}

async function iniciarCameraEGPS() {
  const statusInfo = document.getElementById('status-info');
  document.getElementById('camera-box').classList.remove('oculto');
  document.getElementById('btn-tirar-foto').classList.remove('oculto');
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('btn-refazer').classList.add('oculto');
  document.getElementById('btn-enviar').disabled = true;

  try {
    statusInfo.innerText = "Acessando câmera traseira...";
    videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    const videoElement = document.getElementById('video-camera');
    videoElement.srcObject = videoStream;

    statusInfo.innerText = "Buscando sinal GPS...";
    navigator.geolocation.getCurrentPosition(async (pos) => {
      latFinal = pos.coords.latitude;
      lngFinal = pos.coords.longitude;
      
      try {
        statusInfo.innerText = "Convertendo GPS em endereço...";
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latFinal}&lon=${lngFinal}&format=json`);
        const data = await res.json();
        endFinal = data.display_name;
      } catch(e) { endFinal = "Não foi possível resgatar o nome da rua."; }
      
      gpsPronto = true;
      statusInfo.style.color = "var(--g)";
      statusInfo.innerText = "✓ Câmera e GPS prontos. Pode capturar!";
    }, (err) => {
      alert("ATENÇÃO: Você precisa permitir o acesso à localização para a auditoria.");
      statusInfo.innerText = "❌ Erro de Localização.";
    }, { enableHighAccuracy: true });

  } catch (err) {
    alert("Erro ao acessar a câmera. Verifique as permissões do navegador.");
    statusInfo.innerText = "❌ Câmera bloqueada.";
  }
}

function capturarFoto() {
  if (!gpsPronto) {
    alert("Aguarde um momento, ainda estamos processando sua localização exata.");
    return;
  }

  const video = document.getElementById('video-camera');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  
  const w = video.videoWidth;
  const h = video.videoHeight;
  
  canvas.width = w;
  canvas.height = h + 180;
  
  ctx.drawImage(video, 0, 0, w, h);
  
  ctx.fillStyle = 'black';
  ctx.fillRect(0, h, w, 180);
  
  ctx.fillStyle = 'white';
  ctx.font = '24px Arial';
  const dataHora = new Date().toLocaleString('pt-BR');
  ctx.fillText(`Data/Hora: ${dataHora}`, 20, h + 40);
  ctx.fillText(`GPS: ${latFinal.toFixed(5)} , ${lngFinal.toFixed(5)}`, 20, h + 80);
  
  ctx.font = '18px Arial';
  ctx.fillText(`End.: ${endFinal.substring(0, 80)}...`, 20, h + 120);

  fotoBase64 = canvas.toDataURL('image/jpeg', 0.8);

  document.getElementById('img-preview').src = fotoBase64;
  document.getElementById('img-preview').style.display = 'block';
  document.getElementById('camera-box').classList.add('oculto');
  document.getElementById('btn-tirar-foto').classList.add('oculto');
  document.getElementById('btn-refazer').classList.remove('oculto');
  document.getElementById('status-info').innerText = "Foto carimbada com sucesso!";
  document.getElementById('btn-enviar').disabled = false;

  pararCamera();
}

function refazerFoto() {
  iniciarCameraEGPS();
}

function pararCamera() {
  if (videoStream) {
    videoStream.getTracks().forEach(track => track.stop());
  }
}

// ==========================================
// 4. ENVIO DE DADOS (POST PARA APPS SCRIPT)
// ==========================================
function enviarDados() {
  const btn = document.getElementById('btn-enviar');
  btn.innerText = "Enviando... Não feche a página!";
  btn.disabled = true;

  // Pegamos o valor completo e separamos o CNPJ e o NOME da Loja
  const lojaCompleta = document.getElementById('sel-loja').value;
  const cnpjLoja = lojaCompleta.split("|")[0]; // CNPJ
  const nomeLoja = lojaCompleta.split("|")[1]; // Nome Completo

  const payload = {
    supervisor: document.getElementById('sel-sup').value,
    promotor: document.getElementById('sel-prom').value,
    cnpj: cnpjLoja,
    loja: nomeLoja,
    temTudao: document.getElementById('sel-tudao').value,
    lat: latFinal,
    lng: lngFinal,
    endereco: endFinal,
    image: fotoBase64
  };

  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    if(data.status === "success") {
      alert("✅ Auditoria enviada com sucesso!");
      window.location.reload();
    } else { 
      alert("Erro ao salvar! Tente novamente."); 
      btn.innerText = "Enviar Auditoria";
      btn.disabled = false;
    }
  })
  .catch(e => { 
    alert("Erro de conexão. Verifique sua internet."); 
    btn.innerText = "Enviar Auditoria";
    btn.disabled = false; 
  });
}
